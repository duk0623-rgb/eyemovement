<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VR 단안·MFBF 통합형 시각격자 자극 시스템 V18.0</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
    
    /* 왼쪽 설정 제어판 */
    #control-panel {
      position: absolute; top: 15px; left: 15px; z-index: 99999;
      background: rgba(11, 15, 26, 0.85); color: white; padding: 18px;
      border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.5); width: 310px;
      max-height: 92vh; overflow-y: auto; backdrop-filter: blur(4px);
    }
    .panel-title { font-size: 13px; font-weight: bold; color: #38bdf8; margin-bottom: 12px; text-align: center; border-bottom: 1px solid rgba(59, 130, 246, 0.3); padding-bottom: 6px; line-height: 1.4; }
    .panel-group { margin-bottom: 10px; }
    label { display: block; margin-bottom: 4px; font-size: 11px; color: #cbd5e1; font-weight: bold; }
    select, input[type="range"] { width: 100%; padding: 6px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; font-size: 11px; }
    .display-value { float: right; color: #38bdf8; font-weight: bold; }
    .btn { width: 100%; padding: 11px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 13px; }
    #start-btn { background: #22c55e; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }
    
    /* 우측 메뉴바 (원장님 요청에 따른 필수 임상 데이터 및 제어 전용 개조) */
    #score-board { 
      position: fixed; top: 20px; right: 20px; z-index: 99999; 
      background: rgba(15, 23, 42, 0.95); color: #ffffff; padding: 18px 20px; 
      border-radius: 12px; border: 2px solid #3b82f6; width: 240px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
    .score-label { color: #94a3b8; font-weight: bold; font-size: 12px; }
    .score-value { font-family: monospace; font-size: 16px; font-weight: bold; }
    
    /* 단안 R,L / MFBF 상태 표시용 배지 */
    #mode-status-badge {
      background: #1e1b4b; color: #a855f7; border: 1px solid #a855f7;
      padding: 6px; text-align: center; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 12px;
    }
    
    /* 훈련 중단 및 복귀 버튼 */
    .exit-vr-btn { width: 100%; background: #ef4444; color: white; border: none; border-radius: 6px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 12px; margin-top: 5px; display: none; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
    
    /* 제미니 추천 브랜딩 텍스트 배치 위치 */
    .center-branding { font-size: 11px; color: #38bdf8; font-weight: bold; text-align: center; margin-top: 12px; letter-spacing: 0.5px; opacity: 0.9; border-top: 1px dashed rgba(56, 189, 248, 0.3); padding-top: 8px; }

    #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100000; background: rgba(11, 16, 26, 0.98); color: white; padding: 35px 50px; border-radius: 15px; border: 3px solid #38bdf8; text-align: center; }
    .final-score { font-size: 32px; color: #eab308; margin: 20px 0; font-weight: bold; }
    .reset-btn { background: #38bdf8; color: #000; padding: 10px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
  </style>
  
  <script>
    AFRAME.registerComponent('stereo-eye-lock', {
      schema: { eye: {type: 'string', default: 'both'} },
      init: function () {
        this.layerMask = (this.data.eye === 'left') ? 1 : (this.data.eye === 'right' ? 2 : 0);
        this.el.addEventListener('object3dset', () => { this.applyLayer(); });
        this.applyLayer();
      },
      applyLayer: function () {
        const obj = this.el.getObject3D('mesh') || this.el.object3D;
        if (obj) {
          obj.layers.set(this.layerMask);
          obj.traverse(child => { if(child.layers) child.layers.set(this.layerMask); });
        }
      }
    });
  </script>
</head>
<body>

  <div id="control-panel">
    <div class="panel-title">한국시기능훈련센터 성서계명대점<br><span style="font-size:11px; color:#aaa; font-weight:normal;">시기능 자극 시스템 설정</span></div>
    
    <div class="panel-group">
      <label>👁️ 임상 대상안 프로토콜 선택</label>
      <select id="clinical-mode-select">
        <option value="mfbf" selected>MFBF 모드 (양안 격리 교대 자극)</option>
        <option value="left-only">좌안 단안 훈련 (우안 차폐/적색 고정)</option>
        <option value="right-only">우안 단안 훈련 (좌안 차폐/녹색 고정)</option>
      </select>
    </div>

    <div class="panel-group">
      <label>🏁 배후 격자 밀도(크기) <span class="display-value" id="grid-size-txt">6x6</span></label>
      <input type="range" id="grid-size-slider" min="2" max="16" value="6" step="1">
    </div>

    <div class="panel-group">
      <label>🎈 주시 시표(풍선) 기본 크기 <span class="display-value" id="balloon-size-txt">1.0</span></label>
      <input type="range" id="balloon-size-slider" min="0.5" max="2.0" value="1.0" step="0.1">
    </div>

    <div class="panel-group" style="border-top: 1px dashed rgba(255,255,255,0.15); padding-top: 8px;">
      <label>🧭 배후 격자 제어 모드</label>
      <select id="bg-mode-select" onchange="toggleDirectionModeUI()">
        <option value="auto-protocol" selected>자동 순환 프로토콜 모드</option>
        <option value="manual">수동 특정 방향 고정 모드</option>
      </select>
    </div>

    <div class="panel-group" id="auto-protocol-time-group">
      <label>⏱️ 자동 모드 방향 전환 주기</label>
      <select id="protocol-interval-select">
        <option value="120" selected>2분 단위 전환</option>
        <option value="180">3분 단위 전환</option>
      </select>
    </div>

    <div class="panel-group" id="manual-direction-group" style="display: none;">
      <label>➡️ 수동 방향 지정</label>
      <select id="bg-direction-select">
        <option value="right">오른쪽으로 흐름</option>
        <option value="left">왼쪽으로 흐름</option>
        <option value="up">위로 흐름</option>
        <option value="down">아래로 흐름</option>
        <option value="cw">시계방향 회전</option>
        <option value="ccw">반시계방향 회전</option>
      </select>
    </div>

    <div class="panel-group">
      <label>🔄 배후 격자 이동 속도 <span class="display-value" id="bg-speed-txt">3</span></label>
      <input type="range" id="bg-speed-slider" min="1" max="10" value="3" step="1">
    </div>

    <div class="panel-group">
      <label>🧠 격자 자극 색상 배색</label>
      <select id="grid-color-style-select">
        <option value="standard" selected>표준 격자 모드 (흑백 고대비)</option>
        <option value="pink-clinical">임상용 핑크 격자 자극 모드</option>
      </select>
    </div>
    
    <button id="start-btn" class="btn" onclick="startFusionTraining()">▶️ 시각자극 프로토콜 가동 (VR)</button>
  </div>

  <div id="score-board">
    
    <div class="score-row" style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
      <span class="score-label" style="color: #ef4444;">⏱️ 시간경과</span>
      <span class="score-value" id="val-time" style="color: #ef4444; font-size:18px;">00:00</span>
    </div>
    
    <div class="score-row" style="margin-top: 10px;">
      <span class="score-label" style="color: #22c55e;">🎯 성공개수</span>
      <span class="score-value" id="val-success-count" style="color: #22c55e; font-size:18px;">0</span>
    </div>
    
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 12px 0;">
    
    <div class="score-label" style="margin-bottom: 6px;">🔍 현재 훈련 프로토콜</div>
    <div id="mode-status-badge">MFBF 모드 대기 중</div>
    
    <button id="exit-vr-control" class="exit-vr-btn" onclick="exitVRModeManually()">🔴 훈련중단 및 복귀</button>
    
    <div class="center-branding">한국시기능훈련센터 성서계명대점</div>
  </div>

  <div id="result-modal">
    <h1>📊 시각자극 훈련 프로토콜 완료 📊</h1>
    <p style="color: #aaa; margin: 0;">성서계명대점 평가 데이터</p>
    <div class="final-score">총 성공 개수: <span id="modal-final-score">0</span> 개</div>
    <button class="reset-btn" onclick="location.reload()">처음으로 복귀</button>
  </div>

  <a-scene background="color: #000000" vr-mode-ui="enabled: true">
    <a-assets>
      <canvas id="bgCheckerCanvas" width="512" height="512"></canvas>
    </a-assets>

    <a-sky id="rotating-bg" src="#bgCheckerCanvas" radius="50" material="shader: flat; repeat: 16 16; side: back;"></a-sky>

    <a-entity id="cameraRig">
      <a-entity id="mainCamera" camera look-controls position="0 1.6 0">
        <a-entity id="centerFixationRay" raycaster="objects: .gaze-secure-trigger; far: 100; interval: 10;"></a-entity>
        <a-ring radius-inner="0.02" radius-outer="0.03" color="#ffffff" position="0 0 -1" material="shader: flat; opacity: 0.8; depthTest: false;"></a-ring>
      </a-entity>
    </a-entity>

    <a-entity id="magic-eye-board" visible="true">
      
      <a-entity id="left-eye-container" stereo-eye-lock="eye: left">
        <a-entity id="balloon-left" geometry="primitive: sphere;" material="color: #ff2a2a; roughness: 0.18; metalness: 0.1;">
          <a-cone id="cone-left" radius-top="0.005" color="#cc1111"></a-cone>
        </a-entity>
      </a-entity>
      
      <a-entity id="right-eye-container" stereo-eye-lock="eye: right">
        <a-entity id="balloon-right" geometry="primitive: sphere;" material="color: #10b981; roughness: 0.18; metalness: 0.1;">
          <a-cone id="cone-right" radius-top="0.005" color="#047857"></a-cone>
        </a-entity>
      </a-entity>

      <a-entity id="gaze-collision-trigger" class="gaze-secure-trigger" geometry="primitive: sphere;" material="visible: false;" stereo-eye-lock="eye: both"></a-entity>
    </a-entity>

    <a-entity id="particle-group"></a-entity>
  </a-scene>

  <script>
    const bgCanvas = document.getElementById('bgCheckerCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    
    function drawBackgroundGrid() {
      const colorStyle = document.getElementById('grid-color-style-select').value;
      const density = parseInt(document.getElementById('grid-size-slider').value);
      
      const bW = 512 / density; 
      const bH = 512 / density;
      
      bgCtx.clearRect(0, 0, 512, 512);
      for (let r = 0; r < density; r++) {
        for (let c = 0; c < density; c++) {
          if (colorStyle === 'pink-clinical') {
            bgCtx.fillStyle = ((r + c) % 2 === 0) ? '#2e1065' : '#ff007f';
          } else {
            bgCtx.fillStyle = ((r + c) % 2 === 0) ? '#FFFFFF' : '#000000';
          }
          bgCtx.fillRect(c * bW, r * bH, bW, bH);
        }
      }
      const sky = document.getElementById('rotating-bg');
      if(sky && sky.object3DMap.mesh) {
        sky.object3DMap.mesh.material.map.needsUpdate = true;
      }
    }

    let audioCtx = null; let successCount = 0; let randomRange = 1.40; 
    let baseSpeedParam = 3; let isTrainingActive = false; let isPopping = false; 

    let bgOffsetX = 0; let bgOffsetY = 0; let bgAngle = 0;

    const PROTOCOL_STAGES = ["right", "left", "up", "down", "cw", "ccw"];
    let currentStageIndex = 0;
    let stageDurationSeconds = 120; 

    let gazeHoldStartTime = null;
    const VISUAL_DWELL_REQUIRED = 800; 
    let isGazeIntersecting = false;

    let elapsedInterval = null; let totalSecondsElapsed = 0;      
    let activeTurn = "left"; 
    let currentX = 0, currentY = 1.6, currentZ = -3.5;

    // 슬라이더 변경 시 실시간 반영 리스너
    document.getElementById('bg-speed-slider').addEventListener('input', (e) => {
      baseSpeedParam = parseInt(e.target.value);
      document.getElementById('bg-speed-txt').innerText = baseSpeedParam;
    });
    
    document.getElementById('grid-size-slider').addEventListener('input', (e) => {
      document.getElementById('grid-size-txt').innerText = `${e.target.value}x${e.target.value}`;
      drawBackgroundGrid();
    });
    
    document.getElementById('balloon-size-slider').addEventListener('input', (e) => {
      document.getElementById('balloon-size-txt').innerText = parseFloat(e.target.value).toFixed(1);
      updateTargetSizesOnly();
    });
    
    document.getElementById('grid-color-style-select').addEventListener('change', () => {
      drawBackgroundGrid();
    });

    document.getElementById('clinical-mode-select').addEventListener('change', (e) => {
      updateClinicalBadgePreview();
      updateTargetSizesOnly();
    });

    function toggleDirectionModeUI() {
      const mode = document.getElementById('bg-mode-select').value;
      document.getElementById('manual-direction-group').style.display = (mode === 'manual') ? 'block' : 'none';
      document.getElementById('auto-protocol-time-group').style.display = (mode === 'auto-protocol') ? 'block' : 'none';
    }

    // 원장님 요청: 우측 메뉴바 내 단안 R, L / MFBF 실시간 모드 감지 피드백 텍스트 제어
    function updateClinicalBadgePreview() {
      const mode = document.getElementById('clinical-mode-select').value;
      const badge = document.getElementById('mode-status-badge');
      
      if (mode === "left-only") {
        activeTurn = "left";
        badge.innerText = "🔴 좌안(L) 단안 훈련 중";
        badge.style.color = "#ff2a2a";
        badge.style.borderColor = "#ff2a2a";
      } else if (mode === "right-only") {
        activeTurn = "right";
        badge.innerText = "🟢 우안(R) 단안 훈련 중";
        badge.style.color = "#10b981";
        badge.style.borderColor = "#10b981";
      } else {
        badge.innerText = "🔵 MFBF 양안 격리 교대";
        badge.style.color = "#38bdf8";
        badge.style.borderColor = "#38bdf8";
      }
    }

    function updateTargetSizesOnly() {
      let userBaseMultiplier = parseFloat(document.getElementById('balloon-size-slider').value);
      let finalRadius = 0.22 * 1.0 * userBaseMultiplier; 

      const bLeft = document.getElementById('balloon-left');
      const bRight = document.getElementById('balloon-right');
      const coneLeft = document.getElementById('cone-left');
      const coneRight = document.getElementById('cone-right');
      const cLeft = document.getElementById('left-eye-container');
      const cRight = document.getElementById('right-eye-container');
      const secureTrigger = document.getElementById('gaze-collision-trigger');

      const mode = document.getElementById('clinical-mode-select').value;
      if (mode === "left-only") { activeTurn = "left"; }
      else if (mode === "right-only") { activeTurn = "right"; }

      if (activeTurn === "left") {
        cLeft.setAttribute('visible', 'true'); cRight.setAttribute('visible', 'false');
        bLeft.setAttribute('geometry', `primitive: sphere; radius: ${finalRadius}`);
        coneLeft.setAttribute('position', `0 ${-finalRadius * 1.05} 0`);
        coneLeft.setAttribute('radius-bottom', `${finalRadius * 0.15}`);
        coneLeft.setAttribute('height', `${finalRadius * 0.25}`);
      } else {
        cLeft.setAttribute('visible', 'false'); cRight.setAttribute('visible', 'true');
        bRight.setAttribute('geometry', `primitive: sphere; radius: ${finalRadius}`);
        coneRight.setAttribute('position', `0 ${-finalRadius * 1.05} 0`);
        coneRight.setAttribute('radius-bottom', `${finalRadius * 0.15}`);
        coneRight.setAttribute('height', `${finalRadius * 0.25}`);
      }

      if (secureTrigger) {
        secureTrigger.setAttribute('geometry', `primitive: sphere; radius: ${0.34 * userBaseMultiplier}`);
      }
    }

    function renderAlternatingTargets() {
      if (!isTrainingActive) return;

      const cameraEl = document.getElementById('mainCamera');
      let camPos = {x: 0, y: 1.6, z: 0};
      if (cameraEl && cameraEl.object3D) {
        camPos.x = cameraEl.object3D.position.x; camPos.y = cameraEl.object3D.position.y; camPos.z = cameraEl.object3D.position.z;
      }

      let randomZDepth = 1.5 + (Math.random() * 3.5); 
      let baseZ = camPos.z - randomZDepth; 
      let distanceScaleFactor = randomZDepth / 3.5; 
      let randX = camPos.x + (Math.random() - 0.5) * (randomRange * 2.2 * distanceScaleFactor);
      let randY = camPos.y + (Math.random() - 0.5) * (randomRange * 1.6 * distanceScaleFactor); 

      if (randY < camPos.y - 0.8) randY = camPos.y - 0.8;
      if (randY > camPos.y + 1.1) randY = camPos.y + 1.1;

      currentX = randX; currentY = randY; currentZ = baseZ;

      let userBaseMultiplier = parseFloat(document.getElementById('balloon-size-slider').value);
      let finalRadius = 0.22 * distanceScaleFactor * userBaseMultiplier;
      if(finalRadius < 0.08) finalRadius = 0.08;

      const bLeft = document.getElementById('balloon-left');
      const bRight = document.getElementById('balloon-right');
      const coneLeft = document.getElementById('cone-left');
      const coneRight = document.getElementById('cone-right');
      const secureTrigger = document.getElementById('gaze-collision-trigger');
      const cLeft = document.getElementById('left-eye-container');
      const cRight = document.getElementById('right-eye-container');

      const clinicalMode = document.getElementById('clinical-mode-select').value;
      if (clinicalMode === "left-only") { activeTurn = "left"; } 
      else if (clinicalMode === "right-only") { activeTurn = "right"; }

      // 우측 메뉴바 실시간 모드 감지 동기화 업데이트
      const badge = document.getElementById('mode-status-badge');
      if (clinicalMode === "mfbf") {
        if (activeTurn === "left") {
          badge.innerText = "🔵 MFBF (현재 안: 좌안L)";
          badge.style.color = "#ff2a2a";
        } else {
          badge.innerText = "🔵 MFBF (현재 안: 우안R)";
          badge.style.color = "#10b981";
        }
      }

      if (activeTurn === "left") {
        cLeft.setAttribute('visible', 'true'); cRight.setAttribute('visible', 'false');
        bLeft.setAttribute('geometry', `primitive: sphere; radius: ${finalRadius}`);
        bLeft.setAttribute('position', `${randX} ${randY} ${baseZ}`);
        coneLeft.setAttribute('position', `0 ${-finalRadius * 1.05} 0`);
        coneLeft.setAttribute('radius-bottom', `${finalRadius * 0.15}`);
        coneLeft.setAttribute('height', `${finalRadius * 0.25}`);
      } else {
        cLeft.setAttribute('visible', 'false'); cRight.setAttribute('visible', 'true');
        bRight.setAttribute('geometry', `primitive: sphere; radius: ${finalRadius}`);
        bRight.setAttribute('position', `${randX} ${randY} ${baseZ}`);
        coneRight.setAttribute('position', `0 ${-finalRadius * 1.05} 0`);
        coneRight.setAttribute('radius-bottom', `${finalRadius * 0.15}`);
        coneRight.setAttribute('height', `${finalRadius * 0.25}`);
      }

      if (secureTrigger) {
        secureTrigger.setAttribute('position', `${randX} ${randY} ${baseZ}`);
        let triggerRadius = 0.34 * distanceScaleFactor * userBaseMultiplier;
        if(triggerRadius < 0.22) triggerRadius = 0.22;
        secureTrigger.setAttribute('geometry', `primitive: sphere; radius: ${triggerRadius}`);
        if (!secureTrigger.classList.contains('gaze-secure-trigger')) {
          secureTrigger.classList.add('gaze-secure-trigger');
        }
      }

      isGazeIntersecting = false;
      gazeHoldStartTime = null;
    }

    function checkTargetGazeIntersection() {
      requestAnimationFrame(checkTargetGazeIntersection);
      if (!isTrainingActive || isPopping) return; 

      const raycasterEl = document.getElementById('centerFixationRay');
      if (!raycasterEl) return;

      let raycasterComponent = raycasterEl.components.raycaster;
      
      if (raycasterComponent && raycasterComponent.intersections && raycasterComponent.intersections.length > 0) {
        if (!isGazeIntersecting) {
          isGazeIntersecting = true;
          gazeHoldStartTime = performance.now(); 
        } else {
          let duration = performance.now() - gazeHoldStartTime;
          if (duration >= VISUAL_DWELL_REQUIRED) {
            const secureTrigger = document.getElementById('gaze-collision-trigger');
            if (secureTrigger) { secureTrigger.classList.remove('gaze-secure-trigger'); }
            isPopping = true;
            popTargetSuccess();
          }
        }
      } else {
        if (isGazeIntersecting) {
          isGazeIntersecting = false;
          gazeHoldStartTime = null;
        }
      }
    }

    function popTargetSuccess() {
      successCount++;
      playPopSound(); 
      
      // 2. 성공개수 우측메뉴바 갱신
      document.getElementById('val-success-count').innerText = successCount;
      triggerParticlesEmission(currentX, currentY, currentZ, 12);
      
      const clinicalMode = document.getElementById('clinical-mode-select').value;
      if (clinicalMode === "mfbf") {
        activeTurn = (activeTurn === "left") ? "right" : "left";
      }

      document.getElementById('magic-eye-board').setAttribute('visible', 'false');

      setTimeout(() => {
        if (!isTrainingActive) return;
        isPopping = false;
        renderAlternatingTargets(); 
        document.getElementById('magic-eye-board').setAttribute('visible', 'true'); 
      }, 500); 
    }

    function animateBackground() {
      requestAnimationFrame(animateBackground);
      
      const mode = document.getElementById('bg-mode-select').value;
      let activeStage = "right";

      if (mode === "manual") {
        activeStage = document.getElementById('bg-direction-select').value;
      } else {
        activeStage = isTrainingActive ? PROTOCOL_STAGES[currentStageIndex] : "right";
      }

      let speedFactor = baseSpeedParam * 0.003;
      const sky = document.getElementById('rotating-bg');
      if (!sky) return;

      switch(activeStage) {
        case "right":
          bgOffsetX += speedFactor;
          sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY};`);
          sky.setAttribute('rotation', '0 0 0');
          break;
        case "left":
          bgOffsetX -= speedFactor;
          sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY};`);
          sky.setAttribute('rotation', '0 0 0');
          break;
        case "up":
          bgOffsetY += speedFactor;
          sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY};`);
          sky.setAttribute('rotation', '0 0 0');
          break;
        case "down":
          bgOffsetY -= speedFactor;
          sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY};`);
          sky.setAttribute('rotation', '0 0 0');
          break;
        case "cw":
          bgAngle += (speedFactor * 0.5);
          sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: 0 0;`);
          sky.setAttribute('rotation', `0 0 ${bgAngle * 57.3}`);
          break;
        case "ccw":
          bgAngle -= (speedFactor * 0.5);
          sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: 0 0;`);
          sky.setAttribute('rotation', `0 0 ${bgAngle * 57.3}`);
          break;
      }
    }

    function startElapsedClock() {
      if (elapsedInterval) clearInterval(elapsedInterval);
      totalSecondsElapsed = 0;
      currentStageIndex = 0; 
      
      const mode = document.getElementById('bg-mode-select').value;
      if (mode === "auto-protocol") {
        stageDurationSeconds = parseInt(document.getElementById('protocol-interval-select').value);
      }
      
      let maxTotalSeconds = (mode === "auto-protocol") ? stageDurationSeconds * 6 : 600; 

      elapsedInterval = setInterval(() => {
        if (!isTrainingActive) return;
        totalSecondsElapsed++;
        
        let min = Math.floor(totalSecondsElapsed / 60); 
        let sec = totalSecondsElapsed % 60;
        
        // 1. 시간경과 우측메뉴바 갱신
        document.getElementById('val-time').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        
        if (mode === "auto-protocol") {
          let calculatedStage = Math.floor(totalSecondsElapsed / stageDurationSeconds);
          if (calculatedStage < 6) {
            currentStageIndex = calculatedStage;
          }
        }

        if (totalSecondsElapsed >= maxTotalSeconds) { 
          clearInterval(elapsedInterval); 
          playFanfareAndFinish(); 
        }
      }, 1000);
    }

    function playFanfareAndFinish() {
      isTrainingActive = false;
      document.getElementById('magic-eye-board').setAttribute('visible', 'false');
      document.getElementById('exit-vr-control').style.display = 'none';
      
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [261.63, 392.00, 523.25, 783.99, 1046.50];
      notes.forEach((freq, index) => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
          osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
          osc.connect(gainNode); gainNode.connect(audioCtx.destination);
          osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }, index * 100);
      });

      setTimeout(() => {
        const sceneEl = document.querySelector('a-scene');
        if (sceneEl && sceneEl.is('vr-mode')) sceneEl.exitVR();
        document.getElementById('modal-final-score').innerText = successCount;
        document.getElementById('result-modal').style.display = 'block';
      }, 1200);
    }

    function playPopSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    }

    function triggerParticlesEmission(x, y, z, count) {
      const pGroup = document.getElementById('particle-group');
      for (let i = 0; i < count; i++) {
        const p = document.createElement('a-box');
        p.setAttribute('width', '0.015'); p.setAttribute('height', '0.015'); p.setAttribute('depth', '0.015');
        p.setAttribute('color', activeTurn === "left" ? "#ff2a2a" : "#10b981"); 
        p.setAttribute('position', `${x} ${y} ${z}`);
        
        const vx = (Math.random() - 0.5) * 2.5; const vy = (Math.random() - 0.5) * 2.5 + 1; const vz = (Math.random() - 0.5) * 2.5;
        pGroup.appendChild(p);
        let age = 0;
        const t = setInterval(() => {
          age += 16;
          let cx = x + vx * (age/1000); let cy = y + vy * (age/1000) - (0.5 * 9.8 * (age/1000)*(age/1000)); let cz = z + vz * (age/1000);
          p.setAttribute('position', `${cx} ${cy} ${cz}`);
          if (age > 550) { clearInterval(t); if (p.parentNode) p.parentNode.removeChild(p); }
        }, 16);
      }
    }

    /* 4. 복귀 제어 메커니즘 */
    function exitVRModeManually() {
      isTrainingActive = false; isPopping = false;
      if (elapsedInterval) clearInterval(elapsedInterval);
      document.getElementById('magic-eye-board').setAttribute('visible', 'true');
      document.getElementById('control-panel').style.display = 'block';
      document.getElementById('exit-vr-control').style.display = 'none';
      
      const bLeft = document.getElementById('balloon-left');
      const bRight = document.getElementById('balloon-right');
      const secureTrigger = document.getElementById('gaze-collision-trigger');
      bLeft.setAttribute('position', '0 1.6 -3.5');
      bRight.setAttribute('position', '0 1.6 -3.5');
      if(secureTrigger) secureTrigger.setAttribute('position', '0 1.6 -3.5');

      updateClinicalBadgePreview();
      updateTargetSizesOnly();
      const sceneEl = document.querySelector('a-scene');
      if (sceneEl && sceneEl.is('vr-mode')) sceneEl.exitVR();
    }

    function startFusionTraining() {
      isTrainingActive = true; isPopping = false; successCount = 0;
      document.getElementById('val-success-count').innerText = "0";
      
      drawBackgroundGrid();

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      document.getElementById('control-panel').style.display = 'none';
      document.getElementById('exit-vr-control').style.display = 'block';
      
      const clinicalMode = document.getElementById('clinical-mode-select').value;
      if (clinicalMode === "right-only") { activeTurn = "right"; } else { activeTurn = "left"; }

      document.getElementById('magic-eye-board').setAttribute('visible', 'true');
      renderAlternatingTargets(); 
      startElapsedClock();
      
      const sceneEl = document.querySelector('a-scene');
      if (sceneEl.hasLoaded) { sceneEl.enterVR(); } else { sceneEl.addEventListener('loaded', () => { sceneEl.enterVR(); }); }
    }

    // 기본 초기화 셋팅
    const bLeft = document.getElementById('balloon-left');
    const bRight = document.getElementById('balloon-right');
    const secureTrigger = document.getElementById('gaze-collision-trigger');
    bLeft.setAttribute('position', '0 1.6 -3.5');
    bRight.setAttribute('position', '0 1.6 -3.5');
    if(secureTrigger) secureTrigger.setAttribute('position', '0 1.6 -3.5');

    drawBackgroundGrid();
    updateClinicalBadgePreview();
    updateTargetSizesOnly();
    animateBackground();
    requestAnimationFrame(checkTargetGazeIntersection);
  </script>
</body>
