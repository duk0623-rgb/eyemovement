<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VR 단안·MFBF 통합형 시각격자 자극 시스템 V26.0</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
    
    #control-panel {
      position: absolute; top: 15px; left: 15px; z-index: 99999;
      background: rgba(11, 15, 26, 0.92); color: white; padding: 18px;
      border-radius: 12px; border: 2px solid rgba(59, 130, 246, 0.7); width: 320px;
      max-height: 90vh; display: flex; flex-direction: column; backdrop-filter: blur(6px);
    }
    
    .panel-header { flex-shrink: 0; margin-bottom: 10px; }
    .panel-scroll-body { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-top: 5px; max-height: 45vh; }
    .panel-title { font-size: 13px; font-weight: bold; color: #38bdf8; margin-bottom: 10px; text-align: center; border-bottom: 1px solid rgba(59, 130, 246, 0.3); padding-bottom: 6px; line-height: 1.4; }
    .panel-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 5px; font-size: 11px; color: #cbd5e1; font-weight: bold; }
    select, input[type="range"] { width: 100%; padding: 7px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; font-size: 12px; }
    .display-value { float: right; color: #38bdf8; font-weight: bold; }
    
    .btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; letter-spacing: 0.5px; }
    #start-btn { background: #16a34a; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.4); margin-bottom: 5px; }
    
    #score-board { 
      position: fixed; top: 20px; right: 20px; z-index: 99999; 
      background: rgba(15, 23, 42, 0.95); color: #ffffff; padding: 18px 20px; 
      border-radius: 12px; border: 2px solid #3b82f6; width: 240px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
    .score-label { color: #94a3b8; font-weight: bold; font-size: 12px; }
    .score-value { font-family: monospace; font-size: 16px; font-weight: bold; }
    #mode-status-badge { background: #1e1b4b; color: #38bdf8; border: 1px solid #3b82f6; padding: 6px; text-align: center; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 12px; }
    .exit-vr-btn { width: 100%; background: #ef4444; color: white; border: none; border-radius: 6px; padding: 12px; font-weight: bold; cursor: pointer; font-size: 13px; margin-top: 5px; display: none; }
    .center-branding { font-size: 11px; color: #38bdf8; font-weight: bold; text-align: center; margin-top: 12px; border-top: 1px dashed rgba(56, 189, 248, 0.3); padding-top: 8px; }

    #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100000; background: rgba(11, 16, 26, 0.98); color: white; padding: 35px 50px; border-radius: 15px; border: 3px solid #38bdf8; text-align: center; }
    .final-score { font-size: 32px; color: #eab308; margin: 20px 0; font-weight: bold; }
    .reset-btn { background: #38bdf8; color: #000; padding: 10px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <div id="control-panel">
    <div class="panel-header">
      <div class="panel-title">한국시기능훈련센터 성서계명대점<br><span style="font-size:11px; color:#aaa; font-weight:normal;">시기능 자극 시스템 설정 V26.0</span></div>
      
      <button id="start-btn" class="btn" onclick="startFusionTraining()">▶️ 시각자극 프로토콜 가동</button>
      
      <div class="panel-group" style="margin-top: 8px;">
        <label>👁️ 임상 대상안 프로토콜 선택</label>
        <select id="clinical-mode-select">
          <option value="mfbf" selected>MFBF 모드 (양안 격리 교대 자극)</option>
          <option value="left-only">좌안 단안 훈련 (녹색 풍선만 노출)</option>
          <option value="right-only">우안 단안 훈련 (빨간 풍선만 노출)</option>
        </select>
      </div>
    </div>

    <div class="panel-scroll-body">
      <div class="panel-group" style="background: rgba(34, 197, 94, 0.15); padding: 8px; border-radius: 6px; border: 1px solid rgba(34, 197, 94, 0.4); margin-bottom: 10px;">
        <span style="font-size: 10.5px; color: #22c55e; display: block; line-height: 1.4; font-weight: bold;">
          ✅ [V26 물리 공간 엔진 패치 완료]<br>
          - 혼자 터짐 원천 차단: 풍선이 카메라 종속성에서 완전히 벗어나 3D 세계에 독립적으로 배치됩니다.<br>
          - 흰 원 복시 차단: 흰 원과 풍선의 거리가 언제나 완전 일치하여 융합이 편안해집니다.
        </span>
      </div>

      <div class="panel-group">
        <label>🏁 배후 격자 투명도 <span class="display-value" id="bg-opacity-txt">100%</span></label>
        <input type="range" id="bg-opacity-slider" min="0" max="100" value="100" step="10">
      </div>

      <div class="panel-group">
        <label>🕸️ 양안 융합 유도 가이드</label>
        <select id="fusion-lock-select">
          <option value="active" selected>대형 격자 가이드 켜기</option>
          <option value="inactive">가이드 끄기</option>
        </select>
      </div>

      <div class="panel-group">
        <label>🏁 배후 격자 밀도(크기) <span class="display-value" id="grid-size-txt">6x6</span></label>
        <input type="range" id="grid-size-slider" min="2" max="16" value="6" step="1">
      </div>

      <div class="panel-group">
        <label>🎈 주시 시표(풍선) 기본 크기 <span class="display-value" id="balloon-size-txt">1.0</span></label>
        <input type="range" id="balloon-size-slider" min="0.5" max="2.0" value="1.0" step="0.1">
      </div>

      <div class="panel-group" style="border-top: 1px dashed rgba(255,255,255,0.15); padding-top: 8px;">
        <label>🧭 배후 격자 제어 모드</label>
        <select id="bg-mode-select" onchange="toggleDirectionModeUI()">
          <option value="auto-protocol" selected>자동 순환 프로토콜 모드</option>
          <option value="manual">수동 특정 방향 고정 모드</option>
        </select>
      </div>

      <div class="panel-group" id="auto-protocol-time-group">
        <label>⏱️ 자동 모드 방향 전환 주기</label>
        <select id="protocol-interval-select">
          <option value="120" selected>2분 단위 전환</option>
          <option value="180">3분 단위 전환</option>
        </select>
      </div>

      <div class="panel-group" id="manual-direction-group" style="display: none;">
        <label>➡️ 수동 방향 지정</label>
        <select id="bg-direction-select">
          <option value="right">오른쪽으로 흐름</option>
          <option value="left">왼쪽으로 흐름</option>
          <option value="up">위로 흐름</option>
          <option value="down">아래로 흐름</option>
          <option value="cw">시계방향 회전</option>
          <option value="ccw">반시계방향 회전</option>
        </select>
      </div>

      <div class="panel-group">
        <label>🔄 배후 격자 이동 속도 <span class="display-value" id="bg-speed-txt">3</span></label>
        <input type="range" id="bg-speed-slider" min="1" max="10" value="3" step="1">
      </div>

      <div class="panel-group">
        <label>🧠 격자 자극 색상 배색</label>
        <select id="grid-color-style-select">
          <option value="standard" selected>표준 격자 모드 (흑백 고대비)</option>
          <option value="pink-clinical">임상용 핑크 격자 자극 모드</option>
        </select>
      </div>
    </div>
  </div>

  <div id="score-board">
    <div class="score-row" style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
      <span class="score-label" style="color: #ef4444;">⏱️ 시간경과</span>
      <span class="score-value" id="val-time" style="color: #ef4444; font-size:18px;">00:00</span>
    </div>
    <div class="score-row" style="margin-top: 10px;">
      <span class="score-label" style="color: #22c55e;">🎯 성공개수</span>
      <span class="score-value" id="val-success-count" style="color: #22c55e; font-size:18px;">0</span>
    </div>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 12px 0;">
    <div class="score-label" style="margin-bottom: 6px;">🔍 현재 훈련 프로토콜</div>
    <div id="mode-status-badge">훈련 대기 중</div>
    <button id="exit-vr-control" class="exit-vr-btn" onclick="exitVRModeManually()">🔴 훈련중단 및 복귀</button>
    <div class="center-branding">한국시기능훈련센터 성서계명대점</div>
  </div>

  <div id="result-modal">
    <h1>📊 시각자극 훈련 프로토콜 완료 📊</h1>
    <p style="color: #aaa; margin: 0;">성서계명대점 평가 데이터</p>
    <div class="final-score">총 성공 개수: <span id="modal-final-score">0</span> 개</div>
    <button class="reset-btn" onclick="location.reload()">처음으로 복귀</button>
  </div>

  <a-scene background="color: #000000" vr-mode-ui="enabled: true">
    <a-assets>
      <canvas id="bgCheckerCanvas" width="512" height="512"></canvas>
    </a-assets>

    <a-sky id="rotating-bg" src="#bgCheckerCanvas" radius="50" material="shader: flat; repeat: 16 16; side: back; opacity: 1.0;"></a-sky>

    <a-entity id="fusion-anchor-lines" position="0 1.6 -4" visible="true">
      <a-grid width="8" height="8" thickness="0.015" color="#3b82f6" material="opacity: 0.25; shader: flat; depthTest: false;"></a-grid>
      <a-ring radius-inner="0.3" radius-outer="0.31" color="#22c55e" material="opacity: 0.3; shader: flat; depthTest: false;"></a-ring>
    </a-entity>

    <a-entity id="cameraRig">
      <a-entity id="mainCamera" camera look-controls position="0 1.6 0">
        
        <a-entity id="centerFixationRay" raycaster="objects: .gaze-secure-trigger; far: 50; interval: 15;" position="0 0 0"></a-entity>
        
        <a-ring id="gaze-center-ring" radius-inner="0.018" radius-outer="0.025" color="#ffffff" position="0 0 -3.5" material="shader: flat; opacity: 0.9; depthTest: false;"></a-ring>
        
      </a-entity>
    </a-entity>

    <a-entity id="global-balloon-space"></a-entity>
    <a-entity id="particle-group"></a-entity>
  </a-scene>

  <script>
    const bgCanvas = document.getElementById('bgCheckerCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    
    function drawBackgroundGrid() {
      const colorStyle = document.getElementById('grid-color-style-select').value;
      const density = parseInt(document.getElementById('grid-size-slider').value);
      const bW = 512 / density; const bH = 512 / density;
      bgCtx.clearRect(0, 0, 512, 512);
      for (let r = 0; r < density; r++) {
        for (let c = 0; c < density; c++) {
          bgCtx.fillStyle = (colorStyle === 'pink-clinical') ? (((r + c) % 2 === 0) ? '#2e1065' : '#ff007f') : (((r + c) % 2 === 0) ? '#FFFFFF' : '#000000');
          bgCtx.fillRect(c * bW, r * bH, bW, bH);
        }
      }
      const sky = document.getElementById('rotating-bg');
      if(sky && sky.object3DMap.mesh) sky.object3DMap.mesh.material.map.needsUpdate = true;
    }

    let audioCtx = null; let successCount = 0; 
    let baseSpeedParam = 3; let isTrainingActive = false; let isPopping = false; 
    let bgOffsetX = 0; let bgOffsetY = 0; let bgAngle = 0;
    const PROTOCOL_STAGES = ["right", "left", "up", "down", "cw", "ccw"];
    let currentStageIndex = 0; let stageDurationSeconds = 120; 
    let gazeHoldStartTime = null; const VISUAL_DWELL_REQUIRED = 800; let isGazeIntersecting = false;
    let elapsedInterval = null; let totalSecondsElapsed = 0;      
    let activeTurn = "left"; 
    
    // 풍선의 실시간 전역 위치를 추적하기 위한 변수
    let targetWorldPos = { x: 0, y: 1.6, z: -3.5 };

    document.getElementById('bg-opacity-slider').addEventListener('input', (e) => {
      const opacityVal = parseInt(e.target.value) / 100;
      document.getElementById('bg-opacity-txt').innerText = e.target.value + "%";
      const sky = document.getElementById('rotating-bg');
      if(sky) sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; opacity: ${opacityVal};`);
    });

    document.getElementById('fusion-lock-select').addEventListener('change', (e) => {
      const anchor = document.getElementById('fusion-anchor-lines');
      if(anchor) anchor.setAttribute('visible', e.target.value === 'active');
    });

    document.getElementById('bg-speed-slider').addEventListener('input', (e) => {
      baseSpeedParam = parseInt(e.target.value);
      document.getElementById('bg-speed-txt').innerText = baseSpeedParam;
    });
    
    document.getElementById('grid-size-slider').addEventListener('input', (e) => {
      document.getElementById('grid-size-txt').innerText = `${e.target.value}x${e.target.value}`;
      drawBackgroundGrid();
    });
    
    document.getElementById('balloon-size-slider').addEventListener('input', (e) => {
      document.getElementById('balloon-size-txt').innerText = parseFloat(e.target.value).toFixed(1);
      rebuildTargetBalloon();
    });

    document.getElementById('clinical-mode-select').addEventListener('change', () => {
      updateClinicalBadgePreview();
      rebuildTargetBalloon();
    });

    function toggleDirectionModeUI() {
      const mode = document.getElementById('bg-mode-select').value;
      document.getElementById('manual-direction-group').style.display = (mode === 'manual') ? 'block' : 'none';
      document.getElementById('auto-protocol-time-group').style.display = (mode === 'auto-protocol') ? 'block' : 'none';
    }

    function updateClinicalBadgePreview() {
      const mode = document.getElementById('clinical-mode-select').value;
      const badge = document.getElementById('mode-status-badge');
      if (mode === "left-only") {
        activeTurn = "left"; badge.innerText = "🟢 좌안 훈련 (녹색 풍선)"; badge.style.color = "#10b981"; badge.style.borderColor = "#10b981";
      } else if (mode === "right-only") {
        activeTurn = "right"; badge.innerText = "🔴 우안 훈련 (빨간 풍선)"; badge.style.color = "#ff2a2a"; badge.style.borderColor = "#ff2a2a";
      } else {
        badge.innerText = "🔵 MFBF 양안 교대 자극"; badge.style.color = "#38bdf8"; badge.style.borderColor = "#3b82f6";
      }
    }

    // [V26.0 핵심 수술] 카메라에서 풍선을 떼어내어 전역 공간에 진짜 3D 좌표로 배치
    function rebuildTargetBalloon() {
      const globalSpace = document.getElementById('global-balloon-space');
      const cameraEl = document.getElementById('mainCamera');
      const gazeRing = document.getElementById('gaze-center-ring');
      if (!globalSpace || !cameraEl || !gazeRing) return;
      
      globalSpace.innerHTML = "";
      if (!isTrainingActive) return;

      const mode = document.getElementById('clinical-mode-select').value;
      if (mode === "left-only") activeTurn = "left";
      if (mode === "right-only") activeTurn = "right";

      // 1. 카메라 현재 회전값 벡터 추출
      const cameraObj = cameraEl.object3D;
      let direction = new THREE.Vector3(0, 0, -1);
      direction.applyQuarterion = cameraObj.quaternion; 
      direction.transformDirection(cameraObj.parent.matrixWorld); // 월드 기준 정면 벡터 구하기

      // 2. 가변 입체 깊이 인지 설정 (-2.8m ~ -4.5m)
      let randomDistance = 2.8 + (Math.random() * 1.7);
      
      // [복시 제어 해결책] 흰 원 조준선의 초점 거리를 풍선의 거리와 소수점까지 일치화
      gazeRing.setAttribute('position', `0 0 ${-randomDistance + 0.05}`);
      let ringScale = randomDistance / 3.5;
      gazeRing.setAttribute('radius-inner', 0.018 * ringScale);
      gazeRing.setAttribute('radius-outer', 0.025 * ringScale);

      // 3. [★혼자 터짐 절대 방지★] 정면 기준 상하좌우 완전히 비껴간 위치 계산
      let rightVector = new THREE.Vector3(1, 0, 0).applyQuaternion(cameraObj.quaternion);
      let upVector = new THREE.Vector3(0, 1, 0).applyQuaternion(cameraObj.quaternion);
      
      // 사용자 시야각에 적절한 편차(Offset) 부여
      let spreadX = (Math.random() - 0.5) * (randomDistance * 0.32);
      let spreadY = (Math.random() - 0.5) * (randomDistance * 0.24);

      // 최종 물리 전역 세계의 3D 실좌표 연산 완료
      targetWorldPos.x = cameraObj.position.x + (direction.x * randomDistance) + (rightVector.x * spreadX) + (upVector.x * spreadX);
      targetWorldPos.y = cameraObj.position.y + (direction.y * randomDistance) + (rightVector.y * spreadY) + (upVector.y * spreadY);
      targetWorldPos.z = cameraObj.position.z + (direction.z * randomDistance) + (rightVector.z * spreadX) + (upVector.z * spreadX);

      let userBaseMultiplier = parseFloat(document.getElementById('balloon-size-slider').value);
      let finalRadius = 0.16 * (randomDistance / 3.5) * userBaseMultiplier;
      if(finalRadius < 0.07) finalRadius = 0.07;

      // 4. 독립된 전역 풍선 생성
      const balloon = document.createElement('a-entity');
      balloon.setAttribute('class', 'gaze-secure-trigger');
      balloon.setAttribute('position', `${targetWorldPos.x} ${targetWorldPos.y} ${targetWorldPos.z}`);
      
      if (activeTurn === "left") {
        balloon.setAttribute('geometry', `primitive: sphere; radius: ${finalRadius}`);
        balloon.setAttribute('material', 'color: #10b981; roughness: 0.2; metalness: 0.1;');
        const badge = document.getElementById('mode-status-badge');
        if (mode === "mfbf") { badge.innerText = "🔵 MFBF (현재 타겟: 좌안 🟢)"; badge.style.color = "#10b981"; }
      } else {
        // 우안 타겟: 빨간색 단일 풍선 강제 매칭 고정
        balloon.setAttribute('geometry', `primitive: sphere; radius: ${finalRadius}`);
        balloon.setAttribute('material', 'color: #ff2a2a; roughness: 0.2; metalness: 0.1;');
        const badge = document.getElementById('mode-status-badge');
        if (mode === "mfbf") { badge.innerText = "🔵 MFBF (현재 타겟: 우안 🔴)"; badge.style.color = "#ff2a2a"; }
      }

      globalSpace.appendChild(balloon);
      isGazeIntersecting = false; gazeHoldStartTime = null;
    }

    function renderAlternatingTargets() {
      rebuildTargetBalloon();
    }

    // 진정한 시선 정렬 검사 루프
    function checkTargetGazeIntersection() {
      requestAnimationFrame(checkTargetGazeIntersection);
      if (!isTrainingActive || isPopping) return; 
      
      const raycasterEl = document.getElementById('centerFixationRay');
      if (!raycasterEl) return;
      let raycasterComponent = raycasterEl.components.raycaster;
      
      // 조준선 중심에 물리적으로 전역 풍선이 들어왔을 때만 카운트 시작됨
      if (raycasterComponent && raycasterComponent.intersections && raycasterComponent.intersections.length > 0) {
        if (!isGazeIntersecting) {
          isGazeIntersecting = true; gazeHoldStartTime = performance.now(); 
        } else {
          if (performance.now() - gazeHoldStartTime >= VISUAL_DWELL_REQUIRED) {
            isPopping = true; popTargetSuccess();
          }
        }
      } else {
        if (isGazeIntersecting) { isGazeIntersecting = false; gazeHoldStartTime = null; }
      }
    }

    function popTargetSuccess() {
      successCount++; playPopSound(); 
      document.getElementById('val-success-count').innerText = successCount;
      
      // 터진 위치에 정확히 파티클 생성
      triggerParticlesEmission(targetWorldPos.x, targetWorldPos.y, targetWorldPos.z, 12);
      
      const clinicalMode = document.getElementById('clinical-mode-select').value;
      if (clinicalMode === "mfbf") activeTurn = (activeTurn === "left") ? "right" : "left";

      const globalSpace = document.getElementById('global-balloon-space');
      if(globalSpace) globalSpace.innerHTML = "";
      
      setTimeout(() => {
        if (!isTrainingActive) return;
        isPopping = false; renderAlternatingTargets(); 
      }, 350); 
    }

    function animateBackground() {
      requestAnimationFrame(animateBackground);
      const mode = document.getElementById('bg-mode-select').value;
      let activeStage = (mode === "manual") ? document.getElementById('bg-direction-select').value : (isTrainingActive ? PROTOCOL_STAGES[currentStageIndex] : "right");
      let speedFactor = baseSpeedParam * 0.003;
      const sky = document.getElementById('rotating-bg');
      if (!sky) return;
      const opVal = parseInt(document.getElementById('bg-opacity-slider').value) / 100;

      switch(activeStage) {
        case "right": bgOffsetX += speedFactor; sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY}; opacity: ${opVal};`); sky.setAttribute('rotation', '0 0 0'); break;
        case "left": bgOffsetX -= speedFactor; sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY}; opacity: ${opVal};`); sky.setAttribute('rotation', '0 0 0'); break;
        case "up": bgOffsetY += speedFactor; sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY}; opacity: ${opVal};`); sky.setAttribute('rotation', '0 0 0'); break;
        case "down": bgOffsetY -= speedFactor; sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: ${bgOffsetX} ${bgOffsetY}; opacity: ${opVal};`); sky.setAttribute('rotation', '0 0 0'); break;
        case "cw": bgAngle += (speedFactor * 0.5); sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: 0 0; opacity: ${opVal};`); sky.setAttribute('rotation', `0 0 ${bgAngle * 57.3}`); break;
        case "ccw": bgAngle -= (speedFactor * 0.5); sky.setAttribute('material', `shader: flat; repeat: 16 16; side: back; offset: 0 0; opacity: ${opVal};`); sky.setAttribute('rotation', `0 0 ${bgAngle * 57.3}`); break;
      }
    }

    function startElapsedClock() {
      if (elapsedInterval) clearInterval(elapsedInterval);
      totalSecondsElapsed = 0; currentStageIndex = 0; 
      const mode = document.getElementById('bg-mode-select').value;
      if (mode === "auto-protocol") stageDurationSeconds = parseInt(document.getElementById('protocol-interval-select').value);
      let maxTotalSeconds = (mode === "auto-protocol") ? stageDurationSeconds * 6 : 600; 

      elapsedInterval = setInterval(() => {
        if (!isTrainingActive) return;
        totalSecondsElapsed++;
        document.getElementById('val-time').innerText = `${Math.floor(totalSecondsElapsed / 60).toString().padStart(2, '0')}:${(totalSecondsElapsed % 60).toString().padStart(2, '0')}`;
        if (mode === "auto-protocol") {
          let calculatedStage = Math.floor(totalSecondsElapsed / stageDurationSeconds);
          if (calculatedStage < 6) currentStageIndex = calculatedStage;
        }
        if (totalSecondsElapsed >= maxTotalSeconds) { clearInterval(elapsedInterval); playFanfareAndFinish(); }
      }, 1000);
    }

    function playFanfareAndFinish() {
      isTrainingActive = false;
      const globalSpace = document.getElementById('global-balloon-space');
      if(globalSpace) globalSpace.innerHTML = "";
      document.getElementById('exit-vr-control').style.display = 'none';
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [261.63, 392.00, 523.25, 783.99, 1046.50];
      notes.forEach((freq, index) => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
          osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
          osc.connect(gainNode); gainNode.connect(audioCtx.destination);
          osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }, index * 100);
      });
      setTimeout(() => {
        const sceneEl = document.querySelector('a-scene'); if (sceneEl && sceneEl.is('vr-mode')) sceneEl.exitVR();
        document.getElementById('modal-final-score').innerText = successCount;
        document.getElementById('result-modal').style.display = 'block';
      }, 1200);
    }

    function playPopSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    }

    function triggerParticlesEmission(x, y, z, count) {
      const pGroup = document.getElementById('particle-group');
      if(!pGroup) return;

      for (let i = 0; i < count; i++) {
        const p = document.createElement('a-box');
        p.setAttribute('width', '0.03'); p.setAttribute('height', '0.03'); p.setAttribute('depth', '0.03');
        p.setAttribute('color', activeTurn === "left" ? "#10b981" : "#ff2a2a"); p.setAttribute('position', `${x} ${y} ${z}`);
        const vx = (Math.random() - 0.5) * 2.5; const vy = (Math.random() - 0.5) * 2.5 + 1.0; const vz = (Math.random() - 0.5) * 2.5;
        pGroup.appendChild(p); let age = 0;
        const t = setInterval(() => {
          age += 16;
          p.setAttribute('position', `${x + vx * (age/1000)} ${y + vy * (age/1000) - (0.5 * 9.8 * (age/1000)*(age/1000))} ${z + vz * (age/1000)}`);
          if (age > 500) { clearInterval(t); if (p.parentNode) p.parentNode.removeChild(p); }
        }, 16);
      }
    }

    function exitVRModeManually() {
      isTrainingActive = false; isPopping = false; if (elapsedInterval) clearInterval(elapsedInterval);
      const globalSpace = document.getElementById('global-balloon-space');
      if(globalSpace) globalSpace.innerHTML = "";
      document.getElementById('control-panel').style.display = 'flex';
      document.getElementById('exit-vr-control').style.display = 'none';
      updateClinicalBadgePreview();
      const sceneEl = document.querySelector('a-scene'); if (sceneEl && sceneEl.is('vr-mode')) sceneEl.exitVR();
    }

    function startFusionTraining() {
      isTrainingActive = true; isPopping = false; successCount = 0;
      document.getElementById('val-success-count').innerText = "0";
      drawBackgroundGrid();
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      document.getElementById('control-panel').style.display = 'none';
      document.getElementById('exit-vr-control').style.display = 'block';
      updateClinicalBadgePreview();
      renderAlternatingTargets(); startElapsedClock();
      const sceneEl = document.querySelector('a-scene');
      if (sceneEl.hasLoaded) { sceneEl.enterVR(); } else { sceneEl.addEventListener('loaded', () => { sceneEl.enterVR(); }); }
    }

    drawBackgroundGrid();
    updateClinicalBadgePreview();
    animateBackground();
    requestAnimationFrame(checkTargetGazeIntersection);
  </script>
</body>
